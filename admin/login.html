<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk Panel Admin — Undangan Ulang Tahun Alfath 🚛</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Supabase Core + Config & Guard -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/middleware/authGuard.js"></script>
    
    <style>
        :root {
            --navy:    #0F172A;
            --navy-mid:#1E3A5F;
            --sky:     #60A5FA;
            --orange:  #F97316;
            --orange-d:#EA6500;
            --white:   #FAFAF9;
            --slate:   #94A3B8;
            --gold:    #FBBF24;
            --red:     #EF4444;
            --green:   #10B981;
            
            --radius-md:  12px;
            --radius-lg:  20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--navy);
            background-image: 
                radial-gradient(at 0% 0%, rgba(249, 115, 22, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(96, 165, 250, 0.12) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            background: rgba(30, 41, 59, 0.25);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-lg);
            padding: 40px 32px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        header h1 {
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 1.8rem;
            color: var(--white);
            margin-bottom: 8px;
        }

        header h1 span {
            background: linear-gradient(135deg, var(--gold), var(--orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header .subtitle {
            color: var(--slate);
            font-size: 0.9rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
            position: relative;
        }

        label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--slate);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            font-size: 1.1rem;
            color: var(--slate);
            pointer-events: none;
        }

        input {
            width: 100%;
            padding: 12px 48px 12px 42px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: var(--white);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--orange);
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15);
        }

        .btn-toggle-password {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            color: var(--slate);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
        }

        .btn-toggle-password:hover {
            color: var(--white);
        }

        .btn-submit {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, var(--orange), var(--orange-d));
            border: none;
            border-radius: 30px;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(249, 115, 22, 0.3);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(249, 115, 22, 0.45);
        }

        .btn-submit:disabled {
            background: rgba(255, 255, 255, 0.08);
            color: var(--slate);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* Notifications & Error message block */
        .error-container {
            display: none;
            align-items: flex-start;
            gap: 10px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            color: #FCA5A5;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .error-container.show {
            display: flex;
        }

        .error-icon {
            font-size: 1.1rem;
            flex-shrink: 0;
            line-height: 1;
        }

        /* Spinner for loading */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .loading .spinner {
            display: block;
        }

        .loading .btn-text {
            opacity: 0.8;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <header>
            <h1>Admin <span>Panel</span></h1>
            <p class="subtitle">Masuk untuk mengelola undangan digital Alfath</p>
        </header>

        <!-- Dynamic Error Container -->
        <div id="error-box" class="error-container" role="alert">
            <span class="error-icon">⚠️</span>
            <span id="error-message">Email atau password tidak valid</span>
        </div>

        <form id="login-form" novalidate>
            <!-- Email Input -->
            <div class="form-group">
                <label for="login-email">Alamat Email</label>
                <div class="input-wrapper">
                    <span class="input-icon">✉️</span>
                    <input 
                        type="email" 
                        id="login-email" 
                        placeholder="nama@email.com" 
                        required 
                        autocomplete="email"
                        aria-required="true"
                    >
                </div>
            </div>

            <!-- Password Input -->
            <div class="form-group">
                <label for="login-password">Kata Sandi</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input 
                        type="password" 
                        id="login-password" 
                        placeholder="••••••••" 
                        required 
                        autocomplete="current-password"
                        aria-required="true"
                    >
                    <button type="button" id="btn-toggle-pass" class="btn-toggle-password" aria-label="Tampilkan kata sandi">
                        <!-- Eye Icon SVG -->
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="btn-submit" class="btn-submit">
                <div class="spinner" id="btn-spinner"></div>
                <span class="btn-text" id="btn-label-text">Masuk ke Dashboard</span>
            </button>
        </form>
    </div>

    <!-- Auth Service script -->
    <script src="../js/services/authService.js"></script>
    <script>
        'use strict';

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('login-form');
            const emailInput = document.getElementById('login-email');
            const passwordInput = document.getElementById('login-password');
            const togglePassBtn = document.getElementById('btn-toggle-pass');
            const eyeIcon = document.getElementById('eye-icon');
            const btnSubmit = document.getElementById('btn-submit');
            const btnSpinner = document.getElementById('btn-spinner');
            const btnText = document.getElementById('btn-label-text');
            const errorBox = document.getElementById('error-box');
            const errorMessage = document.getElementById('error-message');

            // Check URL parameters for redirection errors
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('error') === 'unauthorized') {
                showError('Akun Anda tidak terdaftar sebagai administrator.');
            } else if (urlParams.get('error') === 'session_expired') {
                showError('Sesi login Anda telah kedaluwarsa. Silakan masuk kembali.');
            }

            // Toggle Password Visibility
            togglePassBtn.addEventListener('click', () => {
                const isPassword = passwordInput.getAttribute('type') === 'password';
                passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
                togglePassBtn.setAttribute('aria-label', isPassword ? 'Sembunyikan kata sandi' : 'Tampilkan kata sandi');
                
                // Toggle SVG Eye / Eye-off
                if (isPassword) {
                    // Show eye-off paths
                    eyeIcon.innerHTML = `
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                        <line x1="1" y1="1" x2="23" y2="23"></line>
                    `;
                } else {
                    // Show standard eye paths
                    eyeIcon.innerHTML = `
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    `;
                }
            });

            // Form Submit handler
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                hideError();

                const email = emailInput.value.trim();
                const password = passwordInput.value;

                // Validation
                if (!email) {
                    showError('Silakan masukkan alamat email Anda.');
                    emailInput.focus();
                    return;
                }
                if (!password) {
                    showError('Silakan masukkan kata sandi Anda.');
                    passwordInput.focus();
                    return;
                }

                // Trigger Loading State
                setLoading(true);

                try {
                    await authService.login(email, password);
                    
                    // On success, redirect to dashboard.html
                    window.location.href = './dashboard.html';
                } catch (err) {
                    console.error('Login error details:', err);
                    setLoading(false);

                    // User-friendly error mappings
                    if (err.message === 'UNAUTHORIZED_ROLE') {
                        showError('Akses ditolak. Akun Anda tidak terdaftar sebagai administrator.');
                    } else if (err.status === 400 || err.message.includes('Invalid login credentials') || err.message.includes('invalid_credentials')) {
                        showError('Email atau kata sandi yang Anda masukkan salah.');
                    } else if (err.message.includes('Network') || err.message.includes('fetch')) {
                        showError('Gagal terhubung. Pastikan koneksi internet Anda aktif.');
                    } else {
                        showError('Terjadi kesalahan saat masuk. Silakan coba beberapa saat lagi.');
                    }
                }
            });

            function showError(msg) {
                errorMessage.textContent = msg;
                errorBox.classList.add('show');
            }

            function hideError() {
                errorBox.classList.remove('show');
            }

            function setLoading(isLoading) {
                if (isLoading) {
                    btnSubmit.classList.add('loading');
                    btnSubmit.disabled = true;
                    btnSpinner.style.display = 'block';
                    btnText.textContent = 'Memverifikasi akun...';
                } else {
                    btnSubmit.classList.remove('loading');
                    btnSubmit.disabled = false;
                    btnSpinner.style.display = 'none';
                    btnText.textContent = 'Masuk ke Dashboard';
                }
            }
        });
    </script>
</body>

</html>
