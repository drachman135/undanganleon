<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin — Background Music 🎵</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Supabase Core + Config & Route Guard -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/middleware/authGuard.js"></script>
    
    <!-- Unified Dashboard CSS -->
    <link rel="stylesheet" href="../css/dashboard.css">
    
    <!-- Retain inline overrides from original admin config panel styling -->
    <style>
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .switch-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: rgba(255, 255, 255, 0.1);
            transition: .4s;
            border-radius: 34px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: var(--slate);
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: rgba(249, 115, 22, 0.2);
            border-color: var(--orange);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
            background-color: var(--orange);
        }

        .range-wrapper {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
            accent-color: var(--orange);
        }

        .range-val {
            font-family: monospace;
            font-size: 1rem;
            color: var(--gold);
            min-width: 48px;
            text-align: right;
        }

        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: var(--radius-md);
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(15, 23, 42, 0.2);
            margin-bottom: 20px;
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--orange);
            background: rgba(249, 115, 22, 0.05);
        }

        .drop-icon {
            font-size: 2.2rem;
            margin-bottom: 12px;
            display: block;
        }

        .drop-text {
            font-size: 0.95rem;
            color: var(--white);
            margin-bottom: 4px;
        }

        .drop-subtext {
            font-size: 0.8rem;
            color: var(--slate);
        }

        .file-info {
            display: none;
            align-items: center;
            justify-content: space-between;
            background: rgba(249, 115, 22, 0.05);
            border: 1px solid rgba(249, 115, 22, 0.15);
            border-radius: 8px;
            padding: 12px 16px;
            margin-top: 12px;
            font-size: 0.9rem;
        }

        .file-name {
            font-weight: 500;
            color: var(--white);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 80%;
        }

        .btn-delete-file {
            background: transparent;
            border: none;
            color: var(--red);
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.2s;
        }

        .btn-delete-file:hover {
            opacity: 0.8;
        }

        .btn {
            padding: 14px 20px;
            border: none;
            border-radius: 30px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--orange), var(--orange-d));
            color: white;
            box-shadow: 0 8px 24px rgba(249, 115, 22, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(249, 115, 22, 0.45);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--white);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .audio-previewer {
            margin-top: 20px;
            display: none;
            flex-direction: column;
            gap: 12px;
            background: rgba(96, 165, 250, 0.05);
            border: 1px solid rgba(96, 165, 250, 0.15);
            padding: 16px;
            border-radius: 8px;
        }

        .preview-title {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--sky);
        }

        audio {
            width: 100%;
            height: 40px;
            outline: none;
        }

        .progress-bar-container {
            display: none;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 12px;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--orange);
            transition: width 0.2s ease;
        }

        /* Notifications toast overrides */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 0.95rem;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.4s ease;
            opacity: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-color: var(--green);
            color: var(--white);
        }

        .toast.error {
            border-color: var(--red);
            color: var(--white);
        }
    </style>
</head>

<body>
    <div id="dashboard-content">
        <!-- Supabase Configuration Section (Hidden/Shown depending on state check) -->
        <div class="section-box">
            <h2 class="section-title">⚙️ Konfigurasi Koneksi Supabase</h2>
            <div class="form-group">
                <label for="admin-sb-url">Supabase Project URL</label>
                <input type="text" id="admin-sb-url" placeholder="https://xxxx.supabase.co">
            </div>
            <div class="form-group">
                <label for="admin-sb-key">Supabase Service Role / Anon Key</label>
                <input type="text" id="admin-sb-key" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...">
            </div>
            <button id="btn-connect-supabase" class="btn btn-secondary" style="margin-top: 12px; width: auto;">Hubungkan Supabase</button>
        </div>

        <!-- Music Settings Section -->
        <form id="admin-music-form" class="section-box" style="display: none;">
            <h2 class="section-title">🎵 Pengaturan Musik Latar</h2>

            <!-- Enabled Switch -->
            <div class="form-group switch-group">
                <label for="music-enabled-toggle">Status Musik Latar</label>
                <label class="switch">
                    <input type="checkbox" id="music-enabled-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <!-- Volume Slider -->
            <div class="form-group" style="margin-top: 16px;">
                <label for="music-volume-slider">Volume Default</label>
                <div class="range-wrapper">
                    <input type="range" id="music-volume-slider" min="0" max="1" step="0.05" value="0.4">
                    <span class="range-val" id="volume-val">40%</span>
                </div>
            </div>

            <!-- Loading Screen Duration -->
            <div class="form-group" style="margin-top: 16px;">
                <label for="loading-duration-input">Durasi Layar Memuat (milidetik)</label>
                <input type="number" id="loading-duration-input" min="2000" max="4000" step="100" value="3000">
                <span class="drop-subtext">Masukkan durasi antara 2000ms (2 detik) dan 4000ms (4 detik).</span>
            </div>

            <!-- Audio File Drop Zone -->
            <div class="form-group" style="margin-top: 24px;">
                <label>File Audio Pengiring</label>
                <div class="drop-zone" id="drop-zone">
                    <span class="drop-icon">📤</span>
                    <p class="drop-text">Seret file audio Anda ke sini atau ketuk untuk memilih</p>
                    <p class="drop-subtext">Format yang didukung: MP3, M4A (Maksimal 15MB)</p>
                    <input type="file" id="file-input" accept="audio/mp3,audio/mpeg,audio/x-m4a,audio/mp4" style="display: none;">
                </div>
                
                <div class="file-info" id="file-info">
                    <span class="file-name" id="file-name-label">lagu.mp3</span>
                    <button type="button" class="btn-delete-file" id="btn-delete-audio" title="Hapus Audio">×</button>
                </div>

                <div class="progress-bar-container" id="upload-progress-container">
                    <div class="progress-bar-fill" id="upload-progress-fill"></div>
                </div>
            </div>

            <!-- Audio Live Player Preview -->
            <div class="audio-previewer" id="audio-preview-container">
                <span class="preview-title">Pratinjau Musik Aktif</span>
                <audio id="audio-preview-player" controls></audio>
            </div>

            <div style="margin-top: 24px;">
                <button type="submit" id="btn-save-settings" class="btn btn-primary" style="width: auto;">Simpan Konfigurasi</button>
            </div>
        </form>
    </div>

    <!-- Notification Toast -->
    <div class="toast" id="toast">
        <span class="toast-icon" id="toast-icon">✓</span>
        <span class="toast-message" id="toast-message">Pesan notifikasi</span>
    </div>

    <!-- Scripts -->
    <script src="../js/services/authService.js"></script>
    <script src="../js/admin.js"></script>
    <script src="../js/components/dashboardShell.js"></script>
</body>

</html>
